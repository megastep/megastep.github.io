 <!-- Portfolio Modals -->
 {% for post in site.posts %}
    <div class="portfolio-modal modal fade" id="modal-{{ post.modal-id }}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <button type="button" class="close-modal" data-bs-dismiss="modal" aria-label="Close">
                    <div class="lr">
                        <div class="rl">
                        </div>
                    </div>
                </button>
                <div class="modal-body">
                    <div class="container">
                        <div class="row">
                            <div class="col-lg-8 offset-lg-2">
                                <h2>{{ post.title }}</h2>
                                <hr class="star-primary"/>
                                {% if post.img-url %}
                                <a href="{{ post.img-url }}">
                                {% endif %}
                                <img src="{{ site.imgprefix }}/img/portfolio/{{ post.img }}" class="img-fluid img-centered" alt="{{ post.alt }}" width="900" height="650" loading="lazy" decoding="async"/>
                                {% if post.img-url %}
                                </a>
                                {% endif %}
                                <p>{{ post.description }}</p>
                                <hr class="star-primary"/>
                                <div class="post-content">{{ post.content }}</div>
                                <ul class="list-inline item-details">
                                    <li>Category:
                                        <strong><a href="{{ site.url }}">{{ post.category }}</a>
                                        </strong>
                                    </li>
                                </ul>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"><i class="fa fa-times"></i> Close</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endfor %}
