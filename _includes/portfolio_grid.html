
    <!-- Portfolio Grid Section -->
    <section id="portfolio">
        <div class="container">
            <div class="row">
                <div class="col-lg-12 text-center">
                    <h2>Projects</h2>
                    <hr class="star-primary">
                </div>
            </div>
            <div class="row">
                {% for post in site.posts %}
                    <div class="col-sm-4 portfolio-item">
                        <a href="#modal-{{ post.modal-id }}" class="portfolio-link" data-bs-toggle="modal" data-bs-target="#modal-{{ post.modal-id }}">
                            <div class="caption">
                                <div class="caption-content">
                                    <i class="fa fa-search-plus fa-3x"></i>
				    <p>{{ post.title }}</p>
                                </div>
                            </div>
                            <img src="{{ site.imgprefix }}/img/portfolio/{{ post.img }}" class="img-fluid" alt="{{ post.alt }}" width="900" height="650" loading="lazy" decoding="async">
                        </a>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
